<svg xmlns="http://www.w3.org/2000/svg" viewBox="-18 -18 1045 1595" role="img" aria-label="Peptide Protocol animated logo">
  <style>
    .wR{animation:wipe 1.45s cubic-bezier(.6,.05,.3,1) .05s forwards}
    .wB{animation:wipe 1.5s cubic-bezier(.45,.1,.3,1) .4s forwards}
    .wS{animation:wipe 1.6s cubic-bezier(.5,.08,.32,1) .75s forwards}
    .wF{animation:wipe .6s cubic-bezier(.3,.2,.3,1) 1.7s forwards}
    .wR,.wB,.wS,.wF{stroke-dasharray:100.6;stroke-dashoffset:100.6}
    .final{opacity:0;animation:fadeIn .55s ease-out 2.3s forwards}
    .enterI{opacity:0;transform:scale(.93) rotate(-5deg);animation:enter 1.15s cubic-bezier(.22,1,.36,1) forwards}
    .breatheI{animation:breathe 5.6s ease-in-out 3s infinite alternate}
    .sheen{transform:translateX(-780px);animation:sheen 7s cubic-bezier(.55,0,.3,1) 3.05s infinite}
    @keyframes wipe{to{stroke-dashoffset:0}}
    @keyframes fadeIn{to{opacity:1}}
    @keyframes enter{to{opacity:1;transform:scale(1) rotate(0deg)}}
    @keyframes breathe{from{transform:scale(1)}to{transform:scale(1.014)}}
    @keyframes sheen{0%{transform:translateX(-780px)}26%,100%{transform:translateX(1850px)}}
    @media (prefers-reduced-motion:reduce){
      *{animation:none !important}
      .final,.enterI{opacity:1;transform:none}
      .intro{display:none}
    }
  </style>
